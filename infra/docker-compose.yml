version: '3.9'

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  typing_net:
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-typingmaster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-typingmaster_dev_password}
      POSTGRES_DB:       ${POSTGRES_DB:-typingmaster}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run migrations on first boot
      - ./apps/api/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - typing_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-typingmaster}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - typing_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

